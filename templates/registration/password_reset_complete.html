{% extends 'base.html' %}
{% load static %}

{% block title %}Password Reset Complete — Sport Shop{% endblock %}

{% block auth_content %}
<div class="auth-page">
  <div class="auth-card" style="text-align:center;">

    <div style="width:80px;height:80px;background:var(--success-bg);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
      <i class="bi bi-check-circle-fill" style="font-size:40px;color:var(--success);"></i>
    </div>

    <h2 class="auth-title" style="text-align:center;">Password reset!</h2>
    <p class="auth-subtitle" style="text-align:center;">
      Your password has been changed successfully.
      You can now sign in with your new password.
    </p>

    <a href="{% url 'login' %}" class="btn btn-primary"
       style="width:100%;justify-content:center;padding:12px;font-size:15px;margin-top:12px;">
      <i class="bi bi-box-arrow-in-right"></i>
      Sign In Now
    </a>

    <div class="auth-footer">
      <i class="bi bi-shield-lock"></i> Sport Shop Nepal
    </div>
  </div>
</div>
{% endblock %}
